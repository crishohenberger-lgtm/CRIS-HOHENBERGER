<meta name="twitter:card" content="summary">
<meta name="twitter:title" content="Cris Hohenberger">
<meta name="twitter:description" content="Em breve. Uma página sendo construída com carinho.">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Ctext x='50%25' y='54%25' dominant-baseline='central' text-anchor='middle' font-size='46'%3E%E2%99%A1%3C/text%3E%3C/svg%3E">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{color-scheme:light only;--ink:#000000;--paper:#FFFFFF;--graf:#2B2B2B;--mid:#8C8C8C;--line:#EAEAEA}
html{color-scheme:light only;background:#FFFFFF}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Montserrat',sans-serif;background:var(--paper);color:var(--graf);-webkit-font-smoothing:antialiased;min-height:100vh;min-height:100dvh;display:flex;align-items:center;justify-content:center;padding:32px;line-height:1.6}
.wrap{max-width:560px;width:100%;text-align:center}
.eyebrow{font-size:12px;font-weight:600;letter-spacing:.34em;text-transform:uppercase;color:var(--mid)}
.heart{margin:34px 0 26px;font-size:26px;color:var(--ink);line-height:1}
h1{font-weight:300;font-size:clamp(42px,12vw,72px);letter-spacing:-.03em;line-height:1;color:var(--ink)}
.sub{margin-top:22px;font-size:16px;font-weight:400;color:var(--mid);max-width:380px;margin-left:auto;margin-right:auto}
.divider{width:40px;height:1px;background:var(--line);margin:40px auto 0}
.sign{margin-top:26px;font-size:11px;font-weight:600;letter-spacing:.16em;text-transform:uppercase;color:var(--graf)}
.sign span{display:block;margin-top:6px;font-weight:400;letter-spacing:.12em;color:var(--mid)}
.fade{opacity:0;transform:translateY(10px);animation:rise .9s ease forwards}
.fade.d1{animation-delay:.05s}.fade.d2{animation-delay:.2s}.fade.d3{animation-delay:.35s}.fade.d4{animation-delay:.5s}
@keyframes rise{to{opacity:1;transform:none}}
@media(prefers-reduced-motion:reduce){.fade{animation:none;opacity:1;transform:none}}
</style>
</head>
<body>
<div class="wrap">
<div class="eyebrow fade d1">Cris Hohenberger</div>
<div class="heart fade d2">&#9825;</div>
<h1 class="fade d2">Em breve</h1>
<p class="sub fade d3">Uma p&aacute;gina sendo constru&iacute;da com carinho.</p>
<div class="divider fade d4"></div>
<div class="sign fade d4">Cris Hohenberger<span>Expert em IA e Marketing para o dia a dia</span></div>
</div>
</body>
</html>
